  <text x="600" y="470" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="600" fill="#6b6275" letter-spacing="1">Sites internet pour artisans &amp; TPE</text>
